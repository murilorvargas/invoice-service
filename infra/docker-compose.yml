services:
  mysql:
    image: mysql:8.0
    container_name: invoice-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice_db
      MYSQL_USER: invoice
      MYSQL_PASSWORD: invoice
    volumes:
      - mysql_data:/var/lib/mysql

  localstack:
    image: localstack/localstack:latest
    container_name: invoice-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  mysql_data:
  localstack_data:

services:
  invoice-service-mysql:
    image: mysql:8.0
    container_name: invoice-service-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice_db
      MYSQL_USER: invoice
      MYSQL_PASSWORD: invoice
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "invoice", "-pinvoice"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  invoice-service-localstack:
    image: localstack/localstack:4.4
    container_name: invoice-service-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns,sqs
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  invoice-service-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: invoice-service-app
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: invoice-service-mysql
      SNS_ENDPOINT: http://invoice-service-localstack:4566
      SQS_ENDPOINT: http://invoice-service-localstack:4566
    depends_on:
      invoice-service-mysql:
        condition: service_healthy
      invoice-service-localstack:
        condition: service_healthy

  invoice-service-consumer:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: invoice-service-consumer
    environment:
      MYSQL_HOST: invoice-service-mysql
      SNS_ENDPOINT: http://invoice-service-localstack:4566
      SQS_ENDPOINT: http://invoice-service-localstack:4566
      SPRING_PROFILES_ACTIVE: consumer
    depends_on:
      invoice-service-mysql:
        condition: service_healthy
      invoice-service-localstack:
        condition: service_healthy
